<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FitTrack - Fitness Tracker App</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<!-- Firebase SDKs -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged, updateProfile } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore, doc, setDoc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDvMkDOPRdSo7fKOCF59nsl20D8VwcoJB4",
    authDomain: "fittrack-app-f9e4a.firebaseapp.com",
    projectId: "fittrack-app-f9e4a",
    storageBucket: "fittrack-app-f9e4a.firebasestorage.app",
    messagingSenderId: "719262859231",
    appId: "1:719262859231:web:4a84bec6fb596ca8708e6a",
    measurementId: "G-81FR4J6X6H"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  window._fbAuth = auth;
  window._fbDb = db;
  window._fbFns = { createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged, updateProfile, doc, setDoc, getDoc, updateDoc };

  onAuthStateChanged(auth, async (user) => {
    if (user) {
      const snap = await getDoc(doc(db, "users", user.uid));
      if (snap.exists()) {
        const data = snap.data();
        state.logs = data.logs || [];
        state.weights = data.weights || [];
        state.bmi = data.bmi || { height: '', weight: '' };
      }
      state.currentUser = { name: user.displayName || user.email.split('@')[0], email: user.email, uid: user.uid };
      state.screen = 'app';
      state.tab = 'dashboard';
      r();
    } else {
      state.currentUser = null;
      state.screen = 'auth';
      r();
    }
  });
</script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --color-background-primary:#ffffff;
  --color-background-secondary:#f0f0ee;
  --color-background-tertiary:#f5f5f3;
  --color-text-primary:#1a1a1a;
  --color-text-secondary:#6b6b6b;
  --color-border-secondary:#cccccc;
  --color-border-tertiary:#e0e0e0;
  --font-sans:system-ui,-apple-system,sans-serif;
}
body{font-family:var(--font-sans);background:var(--color-background-tertiary);color:var(--color-text-primary);min-height:100vh}
.page{max-width:440px;margin:0 auto;padding:2rem 1rem}
.app-wrap{max-width:720px;margin:0 auto;padding:1rem}
.hero-bar{background:linear-gradient(135deg,#534AB7 0%,#7F77DD 50%,#D4537E 100%);border-radius:16px;padding:1.25rem 1.5rem;margin-bottom:1.25rem;display:flex;align-items:center;justify-content:space-between}
.hero-bar h1{color:#fff;font-size:18px;font-weight:500}
.hero-bar .sub{color:rgba(255,255,255,0.8);font-size:12px;margin-top:2px}
.user-pill{display:flex;align-items:center;gap:8px}
.avatar{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,0.25);border:2px solid rgba(255,255,255,0.5);display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:500;flex-shrink:0}
.logout-btn{background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.3);border-radius:7px;padding:5px 10px;cursor:pointer;font-size:11px;color:#fff}
.logout-btn:hover{background:rgba(255,255,255,0.25)}
.nav{display:flex;gap:4px;margin-bottom:1.25rem;background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:14px;padding:5px;overflow-x:auto}
.nav button{flex:1;min-width:60px;padding:7px 3px;border:none;border-radius:10px;cursor:pointer;font-size:10px;font-weight:400;background:transparent;color:var(--color-text-secondary);white-space:nowrap;transition:all .2s}
.nav button.active{color:#fff;font-weight:500}
.nav button[data-tab="dashboard"].active{background:linear-gradient(135deg,#534AB7,#7F77DD)}
.nav button[data-tab="log"].active{background:linear-gradient(135deg,#D85A30,#EF9F27)}
.nav button[data-tab="history"].active{background:linear-gradient(135deg,#0F6E56,#1D9E75)}
.nav button[data-tab="weight"].active{background:linear-gradient(135deg,#185FA5,#378ADD)}
.nav button[data-tab="bmi"].active{background:linear-gradient(135deg,#993556,#D4537E)}
.nav button[data-tab="report"].active{background:linear-gradient(135deg,#534AB7,#D4537E)}
.cards4{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:1.25rem}
.mc{border-radius:12px;padding:1rem;color:#fff}
.mc.purple{background:linear-gradient(135deg,#534AB7,#7F77DD)}
.mc.coral{background:linear-gradient(135deg,#D85A30,#EF9F27)}
.mc.teal{background:linear-gradient(135deg,#0F6E56,#1D9E75)}
.mc.blue{background:linear-gradient(135deg,#185FA5,#378ADD)}
.mc .lb{font-size:11px;opacity:.85;margin-bottom:5px}
.mc .vl{font-size:22px;font-weight:500}
.mc .un{font-size:11px;opacity:.75;margin-left:3px}
.mc .ic{font-size:20px;margin-bottom:7px;opacity:.9}
.card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:14px;padding:1.25rem;margin-bottom:1rem}
.card-title{display:flex;align-items:center;gap:8px;margin-bottom:.875rem}
.card-title h2{font-size:14px;font-weight:500;margin:0}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.pbw{margin-bottom:10px}
.pbl{display:flex;justify-content:space-between;font-size:11px;color:var(--color-text-secondary);margin-bottom:4px}
.pbb{background:var(--color-background-secondary);border-radius:99px;height:8px;overflow:hidden}
.pbf{height:100%;border-radius:99px;transition:width .6s cubic-bezier(.4,0,.2,1)}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.sfg{display:flex;flex-direction:column;gap:4px;margin-bottom:8px}
.sfg label{font-size:11px;color:var(--color-text-secondary);font-weight:500}
.sfg input,.sfg select{padding:8px 10px;border:0.5px solid var(--color-border-secondary);border-radius:8px;font-size:13px;background:var(--color-background-primary);color:var(--color-text-primary)}
.sfg input:focus,.sfg select:focus{outline:none;border-color:#7F77DD;box-shadow:0 0 0 3px rgba(127,119,221,0.15)}
.ex-preview{border-radius:10px;padding:10px 14px;margin-bottom:.875rem;display:flex;align-items:center;gap:10px}
.sbtn{width:100%;padding:10px;border:none;border-radius:10px;cursor:pointer;font-size:13px;font-weight:500;color:#fff;margin-top:4px;transition:opacity .15s}
.sbtn:hover{opacity:.9}
.alist{display:flex;flex-direction:column;gap:8px}
.aitem{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;border:0.5px solid var(--color-border-tertiary)}
.aico{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.ainf{flex:1;min-width:0}
.ainf .nm{font-size:13px;font-weight:500}
.ainf .mt{font-size:11px;color:var(--color-text-secondary)}
.ast{display:flex;gap:8px;flex-shrink:0}
.ast .stat{text-align:center;padding:4px 8px;border-radius:6px;background:var(--color-background-secondary)}
.ast .stat strong{display:block;font-size:12px;font-weight:500}
.ast .stat span{font-size:10px;color:var(--color-text-secondary)}
.dbt{background:none;border:none;cursor:pointer;color:var(--color-text-secondary);padding:4px;border-radius:6px}
.dbt:hover{color:#E24B4A;background:#fcebeb}
.bdg{display:inline-flex;align-items:center;gap:3px;padding:3px 8px;border-radius:99px;font-size:11px;font-weight:500}
.empty{text-align:center;padding:2.5rem 1rem;color:var(--color-text-secondary);font-size:13px}
.toast-bar{border-radius:10px;padding:10px 18px;font-size:13px;text-align:center;margin-bottom:1rem;color:#fff;background:linear-gradient(135deg,#0F6E56,#1D9E75)}
.toast-err{background:linear-gradient(135deg,#A32D2D,#E24B4A)}
.cw{position:relative;width:100%;height:190px}
.err-box{color:#791F1F;font-size:12px;background:#FCEBEB;border:0.5px solid #F09595;padding:8px 10px;border-radius:8px;margin-bottom:10px}
.success-box{color:#085041;font-size:12px;background:#E1F5EE;border:0.5px solid #5DCAA5;padding:8px 10px;border-radius:8px;margin-bottom:10px}
.logo{display:flex;align-items:center;gap:10px;justify-content:center;margin-bottom:2rem}
.logo-icon{width:48px;height:48px;border-radius:14px;background:linear-gradient(135deg,#534AB7,#D4537E);display:flex;align-items:center;justify-content:center;color:#fff;font-size:24px}
.logo-text{font-size:24px;font-weight:500}
.logo-sub{font-size:12px;color:var(--color-text-secondary);text-align:center;margin-top:-1.5rem;margin-bottom:2rem}
.auth-card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:18px;padding:1.75rem}
.auth-tabs{display:flex;gap:4px;background:var(--color-background-secondary);border-radius:10px;padding:4px;margin-bottom:1.5rem}
.auth-tabs button{flex:1;padding:8px;border:none;border-radius:8px;cursor:pointer;font-size:13px;background:transparent;color:var(--color-text-secondary);transition:all .15s}
.auth-tabs button.active{color:#fff;background:linear-gradient(135deg,#534AB7,#7F77DD);font-weight:500}
.fg{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
.fg label{font-size:12px;color:var(--color-text-secondary);font-weight:500}
.inp-wrap{position:relative}
.inp-wrap input{width:100%;padding:10px 36px 10px 38px;border:0.5px solid var(--color-border-secondary);border-radius:10px;font-size:14px;background:var(--color-background-primary);color:var(--color-text-primary)}
.inp-wrap input:focus{outline:none;border-color:#7F77DD;box-shadow:0 0 0 3px rgba(127,119,221,0.15)}
.inp-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);font-size:16px;color:var(--color-text-secondary)}
.eye-btn{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--color-text-secondary);font-size:15px;padding:2px}
.primary-btn{width:100%;padding:12px;border:none;border-radius:10px;cursor:pointer;font-size:14px;font-weight:500;color:#fff;margin-top:4px;background:linear-gradient(135deg,#534AB7,#7F77DD);transition:opacity .15s}
.primary-btn:hover{opacity:.9}
.primary-btn:disabled{opacity:.6;cursor:not-allowed}
.forgot{font-size:12px;color:#7F77DD;cursor:pointer;text-align:right;margin-top:-4px;margin-bottom:10px;display:block}
.strength-bar{display:flex;gap:3px;margin-top:6px}
.strength-bar div{flex:1;height:4px;border-radius:2px;background:var(--color-background-secondary)}
.bmi-result{border-radius:14px;padding:1.5rem;text-align:center;margin-bottom:1rem}
.bmi-num{font-size:44px;font-weight:500;margin-bottom:4px}
.bmi-cat{font-size:16px;font-weight:500;margin-bottom:2px}
.bmi-sub{font-size:12px;opacity:.7}
.bmi-scale{display:flex;gap:4px;margin-top:1rem;border-radius:99px;overflow:hidden;height:8px}
.bmi-range-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:0.5px solid var(--color-border-tertiary)}
.bmi-range-row:last-child{border-bottom:none}
.loading{display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:12px}
.spinner{width:40px;height:40px;border:3px solid #EEEDFE;border-top:3px solid #534AB7;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:480px){.cards4{grid-template-columns:1fr 1fr}.frow{grid-template-columns:1fr}.nav button{font-size:9px;min-width:48px}}
</style>
</head>
<body>
<div id="root"><div class="loading"><div class="spinner"></div><p style="color:var(--color-text-secondary);font-size:14px">Loading FitTrack...</p></div></div>
<script>
const EXERCISES=[
  {label:'Running',icon:'ti-run',color:'#3266ad',bg:'#e6f1fb'},
  {label:'Cycling',icon:'ti-bike',color:'#0F6E56',bg:'#E1F5EE'},
  {label:'Swimming',icon:'ti-droplet',color:'#185FA5',bg:'#e6f1fb'},
  {label:'Gym / Weights',icon:'ti-barbell',color:'#D85A30',bg:'#FAECE7'},
  {label:'Yoga',icon:'ti-heart',color:'#993556',bg:'#FBEAF0'},
  {label:'Walking',icon:'ti-walk',color:'#854F0B',bg:'#FAEEDA'},
  {label:'HIIT',icon:'ti-flame',color:'#A32D2D',bg:'#FCEBEB'},
  {label:'Other',icon:'ti-activity',color:'#5F5E5A',bg:'#F1EFE8'},
];
const DAYS=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
function getEx(l){return EXERCISES.find(e=>e.label===l)||EXERCISES[7]}
function today(){return new Date().toISOString().split('T')[0]}
function initials(n){return n.trim().split(/\s+/).map(w=>w[0]).join('').toUpperCase().slice(0,2);}
function ps(p){if(!p)return 0;let s=0;if(p.length>=8)s++;if(/[A-Z]/.test(p))s++;if(/[0-9]/.test(p))s++;if(/[^A-Za-z0-9]/.test(p))s++;return s;}

let state={
  screen:'loading',authTab:'login',showPwd:false,showPwd2:false,
  currentUser:null,toast:'',toastType:'success',
  tab:'dashboard',logs:[],weights:[],bmi:{height:'',weight:''},charts:{},
};

async function saveToFirebase(){
  if(!state.currentUser)return;
  try{
    const {doc,setDoc}=window._fbFns;
    const db=window._fbDb;
    await setDoc(doc(db,'users',state.currentUser.uid),{
      logs:state.logs,weights:state.weights,bmi:state.bmi,
      updatedAt:new Date().toISOString()
    });
  }catch(e){console.error('Save error:',e);}
}

function dc(){Object.values(state.charts).forEach(c=>{try{c.destroy()}catch(e){}});state.charts={};}
function r(){document.getElementById('root').innerHTML='';dc();
  if(state.screen==='loading')return;
  if(state.screen==='auth')renderAuth();
  else renderApp();
}
function showToast(msg,type='success',d=2500){state.toast=msg;state.toastType=type;r();setTimeout(()=>{state.toast='';r();},d);}

function renderAuth(){
  const iL=state.authTab==='login';
  document.getElementById('root').innerHTML=`
  <div class="page">
    <div class="logo">
      <div class="logo-icon"><i class="ti ti-heartbeat"></i></div>
      <div class="logo-text">FitTrack</div>
    </div>
    <p class="logo-sub">Your personal fitness companion</p>
    ${state.toast?`<div class="toast-bar ${state.toastType==='error'?'toast-err':''}">${state.toast}</div>`:''}
    <div class="auth-card">
      <div class="auth-tabs">
        <button class="${iL?'active':''}" onclick="setAT('login')">Login</button>
        <button class="${!iL?'active':''}" onclick="setAT('signup')">Sign up</button>
      </div>
      ${iL?loginHTML():signupHTML()}
    </div>
  </div>`;}

function loginHTML(){return`
  <div id="aErr" class="err-box" style="display:none"></div>
  <div id="aOk" class="success-box" style="display:none"></div>
  <div class="fg"><label>Email address</label>
    <div class="inp-wrap"><i class="ti ti-mail inp-icon"></i>
      <input type="email" id="lE" placeholder="you@example.com" autocomplete="email">
    </div></div>
  <div class="fg"><label>Password</label>
    <div class="inp-wrap"><i class="ti ti-lock inp-icon"></i>
      <input type="${state.showPwd?'text':'password'}" id="lP" placeholder="Enter your password" autocomplete="current-password">
      <button class="eye-btn" onclick="togglePwd()"><i class="ti ${state.showPwd?'ti-eye-off':'ti-eye'}"></i></button>
    </div></div>
  <span class="forgot" onclick="forgotPwd()">Forgot password?</span>
  <button class="primary-btn" id="loginBtn" onclick="doLogin()"><i class="ti ti-login" style="margin-right:6px"></i>Login</button>
  <p style="text-align:center;font-size:12px;color:var(--color-text-secondary);margin-top:1rem">
    No account? <span style="color:#7F77DD;cursor:pointer" onclick="setAT('signup')">Sign up free</span>
  </p>`;}

function signupHTML(){return`
  <div id="aErr" class="err-box" style="display:none"></div>
  <div class="fg"><label>Full name</label>
    <div class="inp-wrap"><i class="ti ti-user inp-icon"></i>
      <input type="text" id="sN" placeholder="Your full name" autocomplete="name">
    </div></div>
  <div class="fg"><label>Email address</label>
    <div class="inp-wrap"><i class="ti ti-mail inp-icon"></i>
      <input type="email" id="sE" placeholder="you@example.com" autocomplete="email">
    </div></div>
  <div class="fg"><label>Password</label>
    <div class="inp-wrap"><i class="ti ti-lock inp-icon"></i>
      <input type="${state.showPwd?'text':'password'}" id="sP" placeholder="Min. 8 characters" oninput="updStr()" autocomplete="new-password">
      <button class="eye-btn" onclick="togglePwd()"><i class="ti ${state.showPwd?'ti-eye-off':'ti-eye'}"></i></button>
    </div>
    <div class="strength-bar" id="sBar"><div></div><div></div><div></div><div></div></div>
    <span id="sLbl" style="font-size:11px;color:var(--color-text-secondary)"></span>
  </div>
  <div class="fg"><label>Confirm password</label>
    <div class="inp-wrap"><i class="ti ti-lock inp-icon"></i>
      <input type="${state.showPwd2?'text':'password'}" id="sP2" placeholder="Re-enter password" autocomplete="new-password">
      <button class="eye-btn" onclick="togglePwd2()"><i class="ti ${state.showPwd2?'ti-eye-off':'ti-eye'}"></i></button>
    </div></div>
  <button class="primary-btn" id="signupBtn" onclick="doSignup()"><i class="ti ti-user-plus" style="margin-right:6px"></i>Create account</button>
  <p style="text-align:center;font-size:12px;color:var(--color-text-secondary);margin-top:1rem">
    Have an account? <span style="color:#7F77DD;cursor:pointer" onclick="setAT('login')">Login</span>
  </p>`;}

function setAT(t){state.authTab=t;state.showPwd=false;state.showPwd2=false;r();}
function togglePwd(){state.showPwd=!state.showPwd;r();}
function togglePwd2(){state.showPwd2=!state.showPwd2;r();}
function updStr(){
  const p=document.getElementById('sP');if(!p)return;
  const s=ps(p.value);
  const cs=['','#E24B4A','#EF9F27','#1D9E75','#0F6E56'];
  const ls=['','Weak','Fair','Good','Strong'];
  document.querySelectorAll('#sBar div').forEach((b,i)=>{b.style.background=i<s?cs[s]:'var(--color-background-secondary)';});
  const l=document.getElementById('sLbl');
  if(l){l.textContent=s>0?ls[s]+' password':'';l.style.color=cs[s]||'var(--color-text-secondary)';}
}
function showErr(m){const e=document.getElementById('aErr');if(e){e.textContent=m;e.style.display='block';}}

async function doLogin(){
  const e=document.getElementById('lE').value.trim();
  const p=document.getElementById('lP').value;
  if(!e||!p){showErr('Email and password are required');return;}
  const btn=document.getElementById('loginBtn');
  if(btn){btn.disabled=true;btn.textContent='Logging in...';}
  try{
    const {signInWithEmailAndPassword}=window._fbFns;
    await signInWithEmailAndPassword(window._fbAuth,e,p);
  }catch(err){
    if(btn){btn.disabled=false;btn.innerHTML='<i class="ti ti-login" style="margin-right:6px"></i>Login';}
    const msg=err.code==='auth/invalid-credential'?'Incorrect email or password':
               err.code==='auth/user-not-found'?'No account found with this email':
               err.code==='auth/too-many-requests'?'Too many attempts. Try again later':'Login failed. Please try again.';
    showErr(msg);
  }
}

async function doSignup(){
  const n=document.getElementById('sN').value.trim();
  const e=document.getElementById('sE').value.trim();
  const p=document.getElementById('sP').value;
  const p2=document.getElementById('sP2').value;
  if(!n||!e||!p){showErr('Please fill in all fields');return;}
  if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e)){showErr('Please enter a valid email');return;}
  if(p.length<8){showErr('Password must be at least 8 characters');return;}
  if(p!==p2){showErr('Passwords do not match');return;}
  const btn=document.getElementById('signupBtn');
  if(btn){btn.disabled=true;btn.textContent='Creating account...';}
  try{
    const {createUserWithEmailAndPassword,updateProfile,doc,setDoc}=window._fbFns;
    const cred=await createUserWithEmailAndPassword(window._fbAuth,e,p);
    await updateProfile(cred.user,{displayName:n});
    await setDoc(doc(window._fbDb,'users',cred.user.uid),{
      name:n,email:e,logs:[],weights:[],bmi:{height:'',weight:''},createdAt:new Date().toISOString()
    });
  }catch(err){
    if(btn){btn.disabled=false;btn.innerHTML='<i class="ti ti-user-plus" style="margin-right:6px"></i>Create account';}
    const msg=err.code==='auth/email-already-in-use'?'An account with this email already exists':
               err.code==='auth/weak-password'?'Password is too weak':'Signup failed. Please try again.';
    showErr(msg);
  }
}

async function forgotPwd(){
  const e=document.getElementById('lE').value.trim();
  if(!e){showErr('Please enter your email first');return;}
  try{
    const {sendPasswordResetEmail}=await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js");
    await sendPasswordResetEmail(window._fbAuth,e);
    document.getElementById('aErr').style.display='none';
    const s=document.getElementById('aOk');
    if(s){s.textContent='Password reset email sent to '+e;s.style.display='block';}
  }catch(err){showErr('Could not send reset email. Check your email address.');}
}

async function doLogout(){
  const {signOut}=window._fbFns;
  await signOut(window._fbAuth);
  state.logs=[];state.weights=[];state.bmi={height:'',weight:''};
}

function renderApp(){
  const u=state.currentUser;
  const td=today();
  const tl=state.logs.filter(l=>l.date===td);
  const ts=tl.reduce((a,l)=>a+Number(l.steps||0),0);
  const tc=tl.reduce((a,l)=>a+Number(l.calories||0),0);
  const tm=tl.reduce((a,l)=>a+Number(l.duration||0),0);
  const TABS=[['dashboard','ti-layout-dashboard','Dashboard'],['log','ti-plus','Log'],['history','ti-history','History'],['weight','ti-scale','Weight'],['bmi','ti-calculator','BMI'],['report','ti-chart-bar','Report']];
  let content='';
  if(state.tab==='dashboard')content=dashHTML(tl,ts,tc,tm);
  else if(state.tab==='log')content=logHTML2();
  else if(state.tab==='history')content=histHTML();
  else if(state.tab==='weight')content=wtHTML();
  else if(state.tab==='bmi')content=bmiHTML();
  else if(state.tab==='report')content=repHTML();
  document.getElementById('root').innerHTML=`
  <div class="app-wrap">
    ${state.toast?`<div class="toast-bar ${state.toastType==='error'?'toast-err':''}">${state.toast}</div>`:''}
    <div class="hero-bar">
      <div><h1><i class="ti ti-heartbeat" style="margin-right:6px"></i>FitTrack</h1><div class="sub">Stay active, stay healthy</div></div>
      <div class="user-pill">
        <span style="color:rgba(255,255,255,0.85);font-size:12px">${u.name.split(' ')[0]}</span>
        <div class="avatar">${initials(u.name)}</div>
        <button class="logout-btn" onclick="doLogout()"><i class="ti ti-logout" style="font-size:12px"></i></button>
      </div>
    </div>
    <div class="nav">${TABS.map(([k,ic,lb])=>`<button data-tab="${k}" class="${state.tab===k?'active':''}" onclick="setTab('${k}')"><i class="ti ${ic}"></i><br>${lb}</button>`).join('')}</div>
    ${content}
  </div>`;
  if(state.tab==='dashboard')setTimeout(()=>buildWkChart(),80);
  if(state.tab==='weight'&&state.weights.length>=2)setTimeout(()=>buildWtChart(),80);
  if(state.tab==='report')setTimeout(()=>buildRepChart(),80);
}

function setTab(t){state.tab=t;r();}

function dashHTML(tl,ts,tc,tm){return`
  <div class="cards4">
    <div class="mc purple"><div class="ic"><i class="ti ti-footprint"></i></div><div class="lb">Steps today</div><div class="vl">${ts.toLocaleString()}<span class="un">/ 10k</span></div></div>
    <div class="mc coral"><div class="ic"><i class="ti ti-flame"></i></div><div class="lb">Calories burned</div><div class="vl">${tc}<span class="un">kcal</span></div></div>
    <div class="mc teal"><div class="ic"><i class="ti ti-clock"></i></div><div class="lb">Active minutes</div><div class="vl">${tm}<span class="un">min</span></div></div>
    <div class="mc blue"><div class="ic"><i class="ti ti-barbell"></i></div><div class="lb">Workouts today</div><div class="vl">${tl.length}<span class="un">sessions</span></div></div>
  </div>
  <div class="card">
    <div class="card-title"><div class="dot" style="background:#7F77DD"></div><h2>Daily goals</h2></div>
    ${[{lb:'Steps',val:ts,goal:10000,g:'linear-gradient(90deg,#534AB7,#7F77DD)'},{lb:'Calories',val:tc,goal:500,g:'linear-gradient(90deg,#D85A30,#EF9F27)'},{lb:'Active minutes',val:tm,goal:60,g:'linear-gradient(90deg,#0F6E56,#1D9E75)'}]
    .map(g=>{const p=Math.min(100,Math.round((g.val/g.goal)*100));return`<div class="pbw"><div class="pbl"><span>${g.lb}</span><span style="color:${p>=100?'#0F6E56':'var(--color-text-secondary)'}">${p}%${p>=100?' ✓':''}</span></div><div class="pbb"><div class="pbf" style="width:${p}%;background:${g.g}"></div></div></div>`;}).join('')}
  </div>
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.875rem">
      <div class="card-title" style="margin:0"><div class="dot" style="background:#D4537E"></div><h2>Weekly activity</h2></div>
      <div style="display:flex;gap:10px;font-size:11px;color:var(--color-text-secondary)">
        <span><span style="display:inline-block;width:9px;height:9px;background:#AFA9EC;border-radius:2px;margin-right:3px"></span>Calories</span>
        <span><span style="display:inline-block;width:9px;height:9px;background:#85B7EB;border-radius:2px;margin-right:3px"></span>Minutes</span>
      </div>
    </div>
    <div class="cw"><canvas id="wkChart"></canvas></div>
  </div>
  ${tl.length?`<div class="card"><div class="card-title"><div class="dot" style="background:#1D9E75"></div><h2>Today's activities</h2></div><div class="alist">${tl.map(l=>aiHTML(l,false)).join('')}</div></div>`
  :`<div class="card"><div class="empty"><i class="ti ti-calendar" style="font-size:32px;display:block;margin-bottom:10px;opacity:.4"></i>No activities logged today<br><span style="font-size:12px">Hit the <strong>Log</strong> tab!</span></div></div>`}`;}

function aiHTML(l,del){const ex=getEx(l.exercise);return`<div class="aitem">
  <div class="aico" style="background:${ex.bg};color:${ex.color}"><i class="ti ${ex.icon}"></i></div>
  <div class="ainf"><div class="nm">${l.exercise}</div><div class="mt">${l.note||'No notes'}</div></div>
  <div class="ast">
    <div class="stat"><strong>${l.duration}</strong><span>min</span></div>
    <div class="stat"><strong>${l.calories}</strong><span>kcal</span></div>
    ${Number(l.steps)>0?`<div class="stat"><strong>${Number(l.steps).toLocaleString()}</strong><span>steps</span></div>`:''}
  </div>
  ${del?`<button class="dbt" onclick="delLog(${l.id})"><i class="ti ti-trash" style="font-size:15px"></i></button>`:''}
</div>`;}

function logHTML2(){return`<div class="card">
  <div class="card-title"><div class="dot" style="background:#EF9F27"></div><h2>Log new activity</h2></div>
  <div id="exPrev" class="ex-preview" style="background:#e6f1fb">
    <i class="ti ti-run" id="exIco" style="font-size:22px;color:#185FA5"></i>
    <span id="exLbl" style="font-weight:500;color:#185FA5">Running</span>
  </div>
  <div class="sfg"><label>Exercise type</label>
    <select id="lEx" onchange="updEx(this.value)">${EXERCISES.map(e=>`<option value="${e.label}">${e.label}</option>`).join('')}</select>
  </div>
  <div class="frow">
    <div class="sfg"><label>Duration (minutes) *</label><input type="number" id="lDur" placeholder="e.g. 30" min="1"></div>
    <div class="sfg"><label>Calories burned *</label><input type="number" id="lCal" placeholder="e.g. 250" min="1"></div>
  </div>
  <div class="frow">
    <div class="sfg"><label>Steps (optional)</label><input type="number" id="lSt" placeholder="e.g. 5000" min="0"></div>
    <div class="sfg"><label>Date</label><input type="date" id="lDt" value="${today()}"></div>
  </div>
  <div class="sfg"><label>Notes (optional)</label><input type="text" id="lNote" placeholder="e.g. Morning run in the park"></div>
  <p class="err-box" id="lErr" style="display:none"></p>
  <button class="sbtn" style="background:linear-gradient(135deg,#D85A30,#EF9F27)" onclick="submitLog()"><i class="ti ti-plus" style="margin-right:5px"></i>Save activity</button>
</div>`;}

function updEx(v){const ex=getEx(v);const p=document.getElementById('exPrev'),i=document.getElementById('exIco'),l=document.getElementById('exLbl');if(p&&i&&l){p.style.background=ex.bg;i.className='ti '+ex.icon;i.style.color=ex.color;l.textContent=v;l.style.color=ex.color;}}

async function submitLog(){
  const dur=document.getElementById('lDur').value,cal=document.getElementById('lCal').value,err=document.getElementById('lErr');
  if(!dur||!cal){err.textContent='Duration and calories are required';err.style.display='block';return;}
  if(isNaN(dur)||isNaN(cal)||Number(dur)<=0||Number(cal)<=0){err.textContent='Please enter valid positive numbers';err.style.display='block';return;}
  state.logs.unshift({id:Date.now(),exercise:document.getElementById('lEx').value,duration:Number(dur),calories:Number(cal),steps:Number(document.getElementById('lSt').value||0),date:document.getElementById('lDt').value,note:document.getElementById('lNote').value});
  await saveToFirebase();
  state.tab='dashboard';showToast('Activity saved to Firebase!');
}

async function delLog(id){state.logs=state.logs.filter(l=>l.id!==id);await saveToFirebase();r();}

function histHTML(){
  const g={};state.logs.forEach(l=>{if(!g[l.date])g[l.date]=[];g[l.date].push(l);});
  const dates=Object.keys(g).sort((a,b)=>b.localeCompare(a));
  if(!state.logs.length)return`<div class="card"><div class="empty"><i class="ti ti-calendar-off" style="font-size:32px;display:block;margin-bottom:10px;opacity:.4"></i>No activities logged yet<br><span style="font-size:12px">Start from the Log tab!</span></div></div>`;
  return dates.map(date=>{const dl=g[date],tc=dl.reduce((a,l)=>a+Number(l.calories||0),0),tm=dl.reduce((a,l)=>a+Number(l.duration||0),0);
  return`<div class="card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.875rem">
    <div class="card-title" style="margin:0"><div class="dot" style="background:#7F77DD"></div><h2>${date===today()?'Today':date}</h2></div>
    <div style="display:flex;gap:6px">
      <span class="bdg" style="background:#FAECE7;color:#993C1D"><i class="ti ti-flame" style="font-size:10px"></i> ${tc} kcal</span>
      <span class="bdg" style="background:#E6F1FB;color:#0C447C"><i class="ti ti-clock" style="font-size:10px"></i> ${tm} min</span>
    </div></div>
    <div class="alist">${dl.map(l=>aiHTML(l,true)).join('')}</div>
  </div>`;}).join('');}

function wtHTML(){return`
  <div class="card"><div class="card-title"><div class="dot" style="background:#378ADD"></div><h2>Log weight</h2></div>
    <div class="frow">
      <div class="sfg"><label>Weight (kg) *</label><input type="number" id="wV" placeholder="e.g. 70.5" step="0.1" min="20" max="300"></div>
      <div class="sfg"><label>Date</label><input type="date" id="wD" value="${today()}"></div>
    </div>
    <div class="sfg"><label>Notes (optional)</label><input type="text" id="wN" placeholder="e.g. After workout"></div>
    <p class="err-box" id="wErr" style="display:none"></p>
    <button class="sbtn" style="background:linear-gradient(135deg,#185FA5,#378ADD)" onclick="submitWt()"><i class="ti ti-plus" style="margin-right:5px"></i>Save weight</button>
  </div>
  ${state.weights.length>=2?`<div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.875rem">
      <div class="card-title" style="margin:0"><div class="dot" style="background:#378ADD"></div><h2>Weight trend</h2></div>
      ${(()=>{const s=[...state.weights].sort((a,b)=>a.date.localeCompare(b.date));const d=(s[s.length-1].weight-s[0].weight).toFixed(1);const dn=Number(d)<0;return`<span style="font-size:12px;font-weight:500;color:${dn?'#0F6E56':'#A32D2D'};background:${dn?'#E1F5EE':'#FCEBEB'};padding:4px 10px;border-radius:99px"><i class="ti ${dn?'ti-trending-down':'ti-trending-up'}"></i> ${d} kg</span>`})()}
    </div>
    <div class="cw"><canvas id="wChart"></canvas></div>
  </div>`:''}
  <div class="card"><div class="card-title"><div class="dot" style="background:#378ADD"></div><h2>Weight history</h2></div>
    ${state.weights.length===0?`<div class="empty">No entries yet. Log your first weight above!</div>`:
    [...state.weights].reverse().map(w=>`<div style="display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:0.5px solid var(--color-border-tertiary)">
      <div><div style="font-size:14px;font-weight:500">${w.weight} kg</div>
      <div style="font-size:11px;color:var(--color-text-secondary)">${w.date}${w.note?' · '+w.note:''}</div></div>
      <button class="dbt" onclick="delWt(${w.id})"><i class="ti ti-trash" style="font-size:15px"></i></button>
    </div>`).join('')}
  </div>`;}

async function submitWt(){
  const v=document.getElementById('wV').value,err=document.getElementById('wErr');
  if(!v||isNaN(v)||Number(v)<20||Number(v)>300){err.textContent='Please enter a valid weight (20–300 kg)';err.style.display='block';return;}
  state.weights.push({id:Date.now(),weight:Number(Number(v).toFixed(1)),date:document.getElementById('wD').value,note:document.getElementById('wN').value});
  await saveToFirebase();showToast('Weight saved!');
}
async function delWt(id){state.weights=state.weights.filter(w=>w.id!==id);await saveToFirebase();r();}

function getBMICat(b){
  if(b<18.5)return{label:'Underweight',dark:'#0C447C',mid:'#185FA5',bg:'#E6F1FB'};
  if(b<25)return{label:'Normal weight',dark:'#085041',mid:'#0F6E56',bg:'#E1F5EE'};
  if(b<30)return{label:'Overweight',dark:'#633806',mid:'#854F0B',bg:'#FAEEDA'};
  return{label:'Obese',dark:'#791F1F',mid:'#A32D2D',bg:'#FCEBEB'};}

function bmiResHTML(bmi,cat){return`
  <div class="bmi-result" style="background:${cat.bg}">
    <div class="bmi-num" style="color:${cat.dark}">${bmi.toFixed(1)}</div>
    <div class="bmi-cat" style="color:${cat.dark}">${cat.label}</div>
    <div class="bmi-sub" style="color:${cat.mid}">Body Mass Index</div>
    <div class="bmi-scale"><div style="background:#B5D4F4"></div><div style="background:#9FE1CB"></div><div style="background:#FAC775"></div><div style="background:#F09595"></div></div>
  </div>
  <div class="card"><div class="card-title"><div class="dot" style="background:#D4537E"></div><h2>BMI categories</h2></div>
    ${[{r:'Below 18.5',l:'Underweight',dark:'#0C447C',mid:'#185FA5',bg:'#E6F1FB'},{r:'18.5–24.9',l:'Normal weight',dark:'#085041',mid:'#0F6E56',bg:'#E1F5EE'},{r:'25.0–29.9',l:'Overweight',dark:'#633806',mid:'#854F0B',bg:'#FAEEDA'},{r:'30+',l:'Obese',dark:'#791F1F',mid:'#A32D2D',bg:'#FCEBEB'}]
    .map(row=>`<div class="bmi-range-row"><div style="display:flex;align-items:center;gap:8px"><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:${row.bg};border:2px solid ${row.mid}"></span><span style="font-size:13px;font-weight:500">${row.l}</span></div><span class="bdg" style="background:${row.bg};color:${row.dark}">BMI ${row.r}</span></div>`).join('')}
    <div style="margin-top:1rem;padding:10px 12px;background:${cat.bg};border-radius:10px;font-size:12px;color:${cat.dark}">
      <i class="ti ti-info-circle" style="margin-right:4px"></i>Your BMI is <strong>${bmi.toFixed(1)}</strong> — <strong>${cat.label}</strong>
    </div>
  </div>`;}

function bmiHTML(){
  const h=Number(state.bmi.height),w=Number(state.bmi.weight);
  const bmi=(h>0&&w>0)?w/((h/100)*(h/100)):0;
  const cat=bmi?getBMICat(bmi):null;
  return`<div class="card"><div class="card-title"><div class="dot" style="background:#D4537E"></div><h2>BMI calculator</h2></div>
    <div class="frow">
      <div class="sfg"><label>Height (cm)</label><input type="number" id="bH" value="${state.bmi.height}" placeholder="e.g. 170" min="100" max="250" oninput="updBMI(this.value,document.getElementById('bW').value)"></div>
      <div class="sfg"><label>Weight (kg)</label><input type="number" id="bW" value="${state.bmi.weight}" placeholder="e.g. 70" min="20" max="300" step="0.1" oninput="updBMI(document.getElementById('bH').value,this.value)"></div>
    </div>
  </div>
  <div id="bmiRes">${bmi?bmiResHTML(bmi,cat):`<div class="card"><div class="empty"><i class="ti ti-calculator" style="font-size:32px;display:block;margin-bottom:10px;opacity:.4"></i>Enter height and weight above<br><span style="font-size:12px">to calculate your BMI</span></div></div>`}</div>`;}

async function updBMI(h,w){
  state.bmi={height:h,weight:w};
  const bmi=(Number(h)>0&&Number(w)>0)?Number(w)/((Number(h)/100)*(Number(h)/100)):0;
  const res=document.getElementById('bmiRes');if(!res)return;
  res.innerHTML=bmi?bmiResHTML(bmi,getBMICat(bmi)):`<div class="card"><div class="empty"><i class="ti ti-calculator" style="font-size:32px;display:block;margin-bottom:10px;opacity:.4"></i>Enter height and weight above</div></div>`;
  await saveToFirebase();
}

function repHTML(){
  const wd=[];for(let i=6;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);wd.push(d.toISOString().split('T')[0]);}
  const wl=state.logs.filter(l=>wd.includes(l.date));
  const tC=wl.reduce((a,l)=>a+Number(l.calories||0),0),tM=wl.reduce((a,l)=>a+Number(l.duration||0),0),tS=wl.reduce((a,l)=>a+Number(l.steps||0),0);
  const aD=new Set(wl.map(l=>l.date)).size;
  const exC={};wl.forEach(l=>{exC[l.exercise]=(exC[l.exercise]||0)+1;});
  const topEx=Object.entries(exC).sort((a,b)=>b[1]-a[1])[0];
  return`
  <div class="cards4">
    <div class="mc purple"><div class="ic"><i class="ti ti-calendar-week"></i></div><div class="lb">Active days</div><div class="vl">${aD}<span class="un">/ 7</span></div></div>
    <div class="mc coral"><div class="ic"><i class="ti ti-flame"></i></div><div class="lb">Total calories</div><div class="vl">${tC.toLocaleString()}<span class="un">kcal</span></div></div>
    <div class="mc teal"><div class="ic"><i class="ti ti-clock"></i></div><div class="lb">Total minutes</div><div class="vl">${tM}<span class="un">min</span></div></div>
    <div class="mc blue"><div class="ic"><i class="ti ti-footprint"></i></div><div class="lb">Total steps</div><div class="vl">${tS.toLocaleString()}</div></div>
  </div>
  <div class="card"><div class="card-title"><div class="dot" style="background:#7F77DD"></div><h2>Daily calories this week</h2></div>
    <div class="cw"><canvas id="repChart"></canvas></div>
  </div>
  <div class="card"><div class="card-title"><div class="dot" style="background:#D4537E"></div><h2>Weekly summary</h2></div>
    ${[{lb:'Avg. calories per active day',rv:aD?Math.round(tC/aD)+' kcal':'—'},{lb:'Avg. minutes per active day',rv:aD?Math.round(tM/aD)+' min':'—'},{lb:'Total workouts',rv:wl.length+' sessions'},{lb:'Most performed exercise',rv:topEx?topEx[0]+' ('+topEx[1]+'×)':'—'},{lb:'Goal days (≥500 kcal)',rv:wd.filter(d=>state.logs.filter(l=>l.date===d).reduce((a,l)=>a+Number(l.calories||0),0)>=500).length+' / 7 days'}]
    .map(row=>`<div style="display:flex;justify-content:space-between;padding:9px 0;border-bottom:0.5px solid var(--color-border-tertiary)"><span style="font-size:12px;color:var(--color-text-secondary)">${row.lb}</span><span style="font-size:13px;font-weight:500">${row.rv}</span></div>`).join('')}
  </div>
  ${wl.length===0?`<div class="card"><div class="empty"><i class="ti ti-chart-bar" style="font-size:32px;display:block;margin-bottom:10px;opacity:.4"></i>No data this week yet</div></div>`:''}`;
}

function buildWkChart(){
  const el=document.getElementById('wkChart');if(!el)return;
  const labels=[],cal=[],mins=[];
  for(let i=6;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);const ds=d.toISOString().split('T')[0];labels.push(DAYS[d.getDay()===0?6:d.getDay()-1]);const dl=state.logs.filter(l=>l.date===ds);cal.push(dl.reduce((a,l)=>a+Number(l.calories||0),0));mins.push(dl.reduce((a,l)=>a+Number(l.duration||0),0));}
  state.charts.wk=new Chart(el,{type:'bar',data:{labels,datasets:[{label:'Calories',data:cal,backgroundColor:'#AFA9EC',borderRadius:6,yAxisID:'y'},{label:'Minutes',data:mins,backgroundColor:'#85B7EB',borderRadius:6,yAxisID:'y1'}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{position:'left',grid:{color:'rgba(0,0,0,0.04)'},ticks:{color:'#888',font:{size:10}}},y1:{position:'right',grid:{drawOnChartArea:false},ticks:{color:'#888',font:{size:10}}},x:{grid:{display:false},ticks:{color:'#888',font:{size:10},autoSkip:false}}}}});}

function buildWtChart(){
  const el=document.getElementById('wChart');if(!el)return;
  const s=[...state.weights].sort((a,b)=>a.date.localeCompare(b.date));
  state.charts.wt=new Chart(el,{type:'line',data:{labels:s.map(w=>w.date.slice(5)),datasets:[{data:s.map(w=>w.weight),borderColor:'#378ADD',backgroundColor:'rgba(55,138,221,0.08)',pointBackgroundColor:'#378ADD',pointRadius:5,tension:0.4,fill:true}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{ticks:{color:'#888',font:{size:10}},grid:{color:'rgba(0,0,0,0.04)'}},x:{ticks:{color:'#888',font:{size:10}},grid:{display:false}}}}});}

function buildRepChart(){
  const el=document.getElementById('repChart');if(!el)return;
  const wd=[];for(let i=6;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);wd.push(d.toISOString().split('T')[0]);}
  const labels=wd.map(d=>DAYS[new Date(d).getDay()===0?6:new Date(d).getDay()-1]);
  const data=wd.map(d=>state.logs.filter(l=>l.date===d).reduce((a,l)=>a+Number(l.calories||0),0));
  state.charts.rep=new Chart(el,{type:'bar',data:{labels,datasets:[{data,backgroundColor:data.map(v=>v>=500?'#5DCAA5':'#AFA9EC'),borderRadius:6}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{ticks:{color:'#888',font:{size:10}},grid:{color:'rgba(0,0,0,0.04)'}},x:{ticks:{color:'#888',font:{size:10}},grid:{display:false}}}}});}
</script>
</body>
</html>
